<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>My Orders - CafeGo</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="/css/styles.css" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
              "on-error": "#ffffff",
              "tertiary": "#EF4444",
              "cinnabar-non-veg": "#EF4444",
              "surface": "#0f172a",
              "primary": "#10B981",
              "surface-variant": "#334155",
              "foodie-green": "#10B981",
              "tertiary-fixed-dim": "#fca5a5",
              "inverse-primary": "#34d399",
              "outline": "#64748b",
              "tertiary-fixed": "#fee2e2",
              "surface-tint": "#10B981",
              "secondary-fixed-dim": "#fed7aa",
              "surface-container-highest": "#334155",
              "primary-fixed": "#d1fae5",
              "on-secondary-container": "#7c2d12",
              "surface-container": "#1e293b",
              "surface-container-high": "#334155",
              "on-tertiary": "#ffffff",
              "on-tertiary-fixed-variant": "#991b1b",
              "primary-fixed-dim": "#a7f3d0",
              "surface-dim": "#0f172a",
              "primary-container": "#064e3b",
              "outline-variant": "#475569",
              "error-container": "#7f1d1d",
              "on-tertiary-container": "#fee2e2",
              "on-primary-fixed-variant": "#064e3b",
              "on-primary-fixed": "#064e3b",
              "on-secondary-fixed-variant": "#7c2d12",
              "on-surface": "#f8fafc",
              "on-error-container": "#fee2e2",
              "secondary-fixed": "#ffedd5",
              "surface-bright": "#1e293b",
              "tertiary-container": "#991b1b",
              "background": "#090d16",
              "on-secondary": "#ffffff",
              "error": "#ef4444",
              "academic-blue": "#1e3a8a",
              "on-primary-container": "#a7f3d0",
              "surface-white": "#1e293b",
              "inverse-surface": "#f8fafc",
              "on-tertiary-fixed": "#7f1d1d",
              "amber-highlight": "#f97316",
              "on-primary": "#ffffff",
              "secondary": "#f97316",
              "surface-container-low": "#0f172a",
              "on-secondary-fixed": "#7c2d12",
              "inverse-on-surface": "#0f172a",
              "on-background": "#f8fafc",
              "secondary-container": "#ffedd5",
              "surface-container-lowest": "#020617",
              "on-surface-variant": "#cbd5e1"
            },
            "borderRadius": {
              "DEFAULT": "0.25rem",
              "lg": "0.5rem",
              "xl": "0.75rem",
              "full": "9999px"
            },
            "spacing": {
              "base": "4px",
              "margin-desktop": "32px",
              "margin-mobile": "16px",
              "card-padding": "12px",
              "gutter": "16px"
            }
          }
        }
      }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen pb-24">
    <!-- Top App Bar -->
    <header class="bg-background/80 backdrop-blur-md border-b border-white/5 fixed top-0 z-50 flex justify-between items-center px-margin-mobile h-16 w-full shadow-sm">
        <div class="flex items-center gap-3">
            <button onclick="location.href='/student/index.html'" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-800 transition-colors active:scale-95">
                <span class="material-symbols-outlined text-primary">arrow_back</span>
            </button>
            <h1 class="font-bold text-lg text-primary">My Orders</h1>
        </div>
        <div class="flex items-center gap-4">
            <button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-800 transition-colors active:scale-95">
                <span class="material-symbols-outlined text-primary">notifications</span>
            </button>
        </div>
    </header>

    <main class="pt-20 pb-28 px-margin-mobile max-w-2xl mx-auto">
        <!-- Active Orders Section -->
        <section class="mb-10" id="active-section">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-sm font-bold uppercase tracking-wider text-slate-400">Active Orders</h2>
                <span id="active-count-badge" class="bg-primary/10 text-primary border border-primary/20 px-3 py-1 rounded-full text-xs font-semibold">0 Ongoing</span>
            </div>
            
            <div id="active-orders-container" class="space-y-4">
                <!-- Active order cards -->
            </div>
        </section>

        <!-- Past Orders Section -->
        <section>
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-sm font-bold uppercase tracking-wider text-slate-400">Order History</h2>
            </div>
            
            <div id="past-orders-container" class="space-y-4">
                <!-- Past order cards -->
            </div>
        </section>

        <!-- Empty State Prompt -->
        <div class="hidden flex flex-col items-center justify-center py-20 text-center" id="empty-state">
            <div class="w-20 h-20 rounded-full bg-slate-900 flex items-center justify-center mb-4 border border-slate-800">
                <span class="material-symbols-outlined text-slate-500 text-4xl">receipt_long</span>
            </div>
            <h3 class="text-lg font-bold text-white mb-2">No orders yet</h3>
            <p class="text-xs text-slate-450 mb-6 px-10">Hungry? Explore our menu and place your first order today!</p>
            <button onclick="location.href='/student/index.html'" class="bg-primary text-slate-950 px-8 py-3 rounded-xl text-xs font-bold shadow-lg shadow-primary/10 active:scale-95 transition-all hover:brightness-110">
                Go to Menu
            </button>
        </div>
    </main>

    <!-- Bottom Nav Bar -->
    <nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 py-2 bg-slate-900/90 backdrop-blur-lg border-t border-slate-800/50 shadow-lg rounded-t-xl">
        <a class="flex flex-col items-center justify-center text-slate-400 hover:text-primary transition-all active:scale-90 duration-150" href="/student/index.html">
            <span class="material-symbols-outlined">home</span>
            <span class="text-[9px] font-bold">Home</span>
        </a>
        <a class="flex flex-col items-center justify-center text-primary rounded-full px-3 py-1 active:scale-90 duration-150" href="#">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">receipt_long</span>
            <span class="text-[9px] font-bold">Orders</span>
        </a>
        <a class="flex flex-col items-center justify-center text-slate-400 hover:text-primary transition-all active:scale-90 duration-150" href="/student/index.html">
            <span class="material-symbols-outlined">rate_review</span>
            <span class="text-[9px] font-bold">Feedback</span>
        </a>
        <a class="flex flex-col items-center justify-center text-slate-400 hover:text-primary transition-all active:scale-90 duration-150" href="/">
            <span class="material-symbols-outlined">logout</span>
            <span class="text-[9px] font-bold">Log out</span>
        </a>
    </nav>

    <script>
        const loggedInUser = JSON.parse(sessionStorage.getItem('user')) || { id: 1, name: 'Arjun' };

        // Fetch Orders and render
        async function fetchAndRenderOrders() {
            try {
                const res = await fetch('/api/orders');
                const orders = await res.json();
                const studentOrders = orders.filter(o => o.user_id === loggedInUser.id);
                
                const fbRes = await fetch('/api/feedback');
                const feedbacks = await fbRes.json();
                const studentFeedbackIds = feedbacks.filter(f => f.user_id === loggedInUser.id).map(f => f.menu_item_id);

                if (studentOrders.length === 0) {
                    document.getElementById('empty-state').classList.remove('hidden');
                    document.getElementById('active-section').classList.add('hidden');
                    return;
                }

                document.getElementById('empty-state').classList.add('hidden');
                document.getElementById('active-section').classList.remove('hidden');

                const activeOrders = studentOrders.filter(o => o.status !== 'Completed');
                const pastOrders = studentOrders.filter(o => o.status === 'Completed');

                // Render Active
                document.getElementById('active-count-badge').textContent = `${activeOrders.length} Ongoing`;
                const activeContainer = document.getElementById('active-orders-container');
                if (activeOrders.length === 0) {
                    activeContainer.innerHTML = `<div class="text-xs text-slate-450 bg-slate-900 rounded-xl p-4 border border-slate-800 text-center">No active pre-orders right now.</div>`;
                } else {
                    activeContainer.innerHTML = activeOrders.map(order => {
                        const itemsSummary = order.items.map(i => `${i.quantity}x ${i.name}`).join(', ');
                        
                        if (order.status === 'Ready') {
                            return `
                                <div class="bg-slate-900 rounded-xl p-4 mb-4 border-l-4 border-primary relative overflow-hidden border border-slate-800 animate-fade-in-up">
                                    <div class="flex justify-between items-start mb-4">
                                        <div>
                                            <p class="text-[9px] font-bold text-slate-500 mb-1 uppercase tracking-wider">Pickup slot: ${order.pickup_slot}</p>
                                            <h3 class="text-sm font-bold text-white">${order.items[0]?.name || 'Pre-Order'}</h3>
                                            <p class="text-xs text-slate-400 mt-0.5">${itemsSummary}</p>
                                        </div>
                                        <div class="bg-primary/10 text-primary border border-primary/20 px-3 py-1 rounded-full text-xs font-semibold flex items-center gap-1 status-pulse">
                                            <span class="material-symbols-outlined text-[14px] font-bold">check_circle</span>
                                            Ready
                                        </div>
                                    </div>
                                    <div class="flex items-center justify-between bg-slate-950/40 border border-slate-850 rounded-lg p-4">
                                        <div>
                                            <p class="text-[9px] font-bold text-slate-500">Token Number</p>
                                            <p class="text-xl font-extrabold text-primary tracking-tighter">${order.token_number}</p>
                                        </div>
                                        <div class="h-12 w-12 bg-white rounded-lg flex items-center justify-center p-1 border border-slate-800">
                                            <span class="material-symbols-outlined text-slate-900 text-3xl font-bold">qr_code_2</span>
                                        </div>
                                    </div>
                                </div>
                            `;
                        } else if (order.status === 'Preparing') {
                            return `
                                <div class="bg-slate-900 rounded-xl p-4 mb-4 border-l-4 border-secondary border border-slate-800 animate-fade-in-up">
                                    <div class="flex justify-between items-start mb-4">
                                        <div>
                                            <p class="text-[9px] font-bold text-slate-500 mb-1 uppercase tracking-wider">Pickup slot: ${order.pickup_slot}</p>
                                            <h3 class="text-sm font-bold text-white">${order.items[0]?.name || 'Pre-Order'}</h3>
                                            <p class="text-xs text-slate-400 mt-0.5">${itemsSummary}</p>
                                        </div>
                                        <div class="bg-secondary/10 text-secondary border border-secondary/20 px-3 py-1 rounded-full text-xs font-semibold flex items-center gap-1">
                                            <span class="material-symbols-outlined text-[14px]">restaurant</span>
                                            Preparing
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-2.5 bg-slate-950/40 rounded-lg p-3 border border-slate-850">
                                        <span class="material-symbols-outlined text-secondary text-sm">schedule</span>
                                        <p class="text-xs text-slate-300">Estimated wait: <span class="font-bold text-primary">~8 mins</span></p>
                                    </div>
                                </div>
                            `;
                        } else {
                            return `
                                <div class="bg-slate-900 rounded-xl p-4 mb-4 border-l-4 border-slate-600 border border-slate-800 animate-fade-in-up">
                                    <div class="flex justify-between items-start mb-4">
                                        <div>
                                            <p class="text-[9px] font-bold text-slate-500 mb-1 uppercase tracking-wider">Pickup slot: ${order.pickup_slot}</p>
                                            <h3 class="text-sm font-bold text-white">${order.items[0]?.name || 'Pre-Order'}</h3>
                                            <p class="text-xs text-slate-400 mt-0.5">${itemsSummary}</p>
                                        </div>
                                        <div class="bg-slate-800 text-slate-400 px-3 py-1 rounded-full text-xs font-semibold flex items-center gap-1">
                                            <span class="material-symbols-outlined text-[14px]">hourglass_empty</span>
                                            Pending
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-2.5 bg-slate-950/40 rounded-lg p-3 border border-slate-850">
                                        <span class="material-symbols-outlined text-slate-500 text-sm">schedule</span>
                                        <p class="text-xs text-slate-400">Waiting for kitchen acceptance...</p>
                                    </div>
                                </div>
                            `;
                        }
                    }).join('');
                }

                // Render Past
                const pastContainer = document.getElementById('past-orders-container');
                if (pastOrders.length === 0) {
                    pastContainer.innerHTML = `<div class="text-xs text-slate-400 text-center py-6">No order history found.</div>`;
                } else {
                    pastContainer.innerHTML = pastOrders.map(order => {
                        const itemsSummary = order.items.map(i => `${i.quantity}x ${i.name}`).join(', ');
                        const orderDate = new Date(order.created_at).toLocaleDateString('en-US', { day: 'numeric', month: 'short' });
                        const orderTime = new Date(order.created_at).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

                        const rateItem = order.items[0];
                        const isRated = rateItem ? studentFeedbackIds.includes(rateItem.id) : true;

                        let rateSection = '';
                        if (!isRated && rateItem) {
                            rateSection = `
                                <button onclick="rateOrder(${rateItem.id}, '${rateItem.name}', '${orderDate}')" class="flex-grow py-2 px-4 rounded-xl bg-secondary text-white font-bold text-xs shadow-sm active:scale-95 transition-all hover:brightness-110 flex items-center justify-center gap-1">
                                    <span class="material-symbols-outlined text-[14px]">star</span>
                                    Rate Meal
                                </button>
                            `;
                        } else {
                            rateSection = `
                                <div class="flex items-center gap-1 py-2 font-semibold text-xs text-primary bg-primary/5 border border-primary/10 rounded-xl px-4 flex-grow justify-center">
                                    <span class="material-symbols-outlined text-primary text-xs font-bold">check_circle</span>
                                    <span>Rated</span>
                                </div>
                            `;
                        }

                        return `
                            <div class="bg-slate-900 rounded-xl p-4 mb-4 border border-slate-800">
                                <div class="flex gap-3.5">
                                    <div class="w-16 h-16 rounded-lg overflow-hidden flex-shrink-0 relative">
                                        <img class="w-full h-full object-cover" src="${order.items[0]?.image_url || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=100'}" alt=""/>
                                    </div>
                                    <div class="flex-grow min-w-0">
                                        <div class="flex justify-between items-start gap-1">
                                            <h4 class="text-xs font-bold text-white truncate pr-1">${order.items[0]?.name || 'Canteen Meal'}</h4>
                                            <p class="text-xs font-bold text-white">₹${order.total_amount.toFixed(2)}</p>
                                        </div>
                                        <p class="text-[10px] text-slate-500 mt-0.5 mb-3">${orderDate} • ${orderTime}</p>
                                        <div class="flex gap-2">
                                            <button onclick="reorderItems(${order.id})" class="flex-grow py-2 px-4 rounded-xl border border-primary text-primary font-bold text-xs hover:bg-slate-850 transition-colors active:scale-95" id="reorder-btn-${order.id}">
                                                Reorder
                                            </button>
                                            ${rateSection}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');
                }
            } catch (err) {
                console.error("Error loading student orders", err);
            }
        }

        function rateOrder(itemId, itemName, dateStr) {
            sessionStorage.setItem('rating_item_id', itemId);
            sessionStorage.setItem('rating_item_name', itemName);
            sessionStorage.setItem('rating_item_date', dateStr);
            window.location.href = '/student/feedback.html';
        }

        async function reorderItems(orderId) {
            const btn = document.getElementById(`reorder-btn-${orderId}`);
            btn.textContent = 'Adding...';
            
            try {
                const res = await fetch('/api/orders');
                const orders = await res.json();
                const order = orders.find(o => o.id === orderId);
                
                if (order) {
                    const cart = order.items.map(item => ({
                        id: item.id,
                        name: item.name,
                        price: item.price,
                        is_veg: item.is_veg === undefined ? true : item.is_veg,
                        image_url: item.image_url || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=100',
                        quantity: item.quantity
                    }));
                    localStorage.setItem('cart', JSON.stringify(cart));
                    btn.textContent = 'Added!';
                    btn.className = 'flex-grow py-2 px-4 rounded-xl bg-primary text-slate-950 font-bold text-xs active:scale-95 transition-all';
                    setTimeout(() => {
                        window.location.href = '/student/checkout.html';
                    }, 1000);
                }
            } catch (err) {
                console.error(err);
                btn.textContent = 'Reorder';
            }
        }

        setInterval(fetchAndRenderOrders, 10000);
        fetchAndRenderOrders();
    </script>
</body>
</html>
