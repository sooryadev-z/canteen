    <title>My Orders - CafeGo</title>
    <script>
        (function() {
            const loggedInUser = JSON.parse(sessionStorage.getItem('user'));
            if (!loggedInUser || loggedInUser.role !== 'student') {
                window.location.replace('/');
            }
        })();
    </script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    </script>
    <style>

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

</head>
<body class="bg-background text-on-background min-h-screen pb-24">
    <!-- Top App Bar -->
    <header class="bg-background/80 backdrop-blur-md border-b border-white/5 fixed top-0 z-50 flex justify-between items-center px-margin-mobile h-16 w-full shadow-sm">
        <div class="flex items-center gap-3">
            <button onclick="location.href='/student/index.html'" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-800 transition-colors active:scale-95">
                <span class="material-symbols-outlined text-primary">arrow_back</span>
            </button>
            <h1 class="font-bold text-lg text-primary">My Orders</h1>
        </div>
        <div class="flex items-center gap-4">
            <button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-800 transition-colors active:scale-95">
                <span class="material-symbols-outlined text-primary">notifications</span>
            </button>
        </div>
    </header>

    <main class="pt-20 pb-28 px-margin-mobile max-w-2xl mx-auto">
        <!-- Active Orders Section -->
        <section class="mb-10" id="active-section">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-sm font-bold uppercase tracking-wider text-slate-400">Active Orders</h2>
                <span id="active-count-badge" class="bg-primary/10 text-primary border border-primary/20 px-3 py-1 rounded-full text-xs font-semibold">0 Ongoing</span>
            </div>
            
            <div id="active-orders-container" class="space-y-4">
                <!-- Active order cards -->
            </div>
        </section>

        <!-- Past Orders Section -->
        <section>
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-sm font-bold uppercase tracking-wider text-slate-400">Order History</h2>
            </div>
            
            <div id="past-orders-container" class="space-y-4">
                <!-- Past order cards -->
            </div>
        </section>

        <!-- Empty State Prompt -->
        <div class="hidden flex flex-col items-center justify-center py-20 text-center" id="empty-state">
            <div class="w-20 h-20 rounded-full bg-slate-900 flex items-center justify-center mb-4 border border-slate-800">
                <span class="material-symbols-outlined text-slate-500 text-4xl">receipt_long</span>
            </div>
            <h3 class="text-lg font-bold text-white mb-2">No orders yet</h3>
            <p class="text-xs text-slate-450 mb-6 px-10">Hungry? Explore our menu and place your first order today!</p>
            <button onclick="location.href='/student/index.html'" class="bg-primary text-slate-950 px-8 py-3 rounded-xl text-xs font-bold shadow-lg shadow-primary/10 active:scale-95 transition-all hover:brightness-110">
                Go to Menu
            </button>
        </div>
    </main>

    <!-- Bottom Nav Bar -->
    <nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 py-2 bg-slate-900/90 backdrop-blur-lg border-t border-slate-800/50 shadow-lg rounded-t-xl">
        <a class="flex flex-col items-center justify-center text-slate-400 hover:text-primary transition-all active:scale-90 duration-150" href="/student/index.html">
            <span class="material-symbols-outlined">home</span>
            <span class="text-[9px] font-bold">Home</span>
        </a>
        <a class="flex flex-col items-center justify-center text-primary rounded-full px-3 py-1 active:scale-90 duration-150" href="#">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">receipt_long</span>
            <span class="text-[9px] font-bold">Orders</span>
        </a>
        <a class="flex flex-col items-center justify-center text-slate-400 hover:text-primary transition-all active:scale-90 duration-150" href="/student/feedback.html">
            <span class="material-symbols-outlined">rate_review</span>
            <span class="text-[9px] font-bold">Feedback</span>
        </a>
        <a onclick="sessionStorage.removeItem('user')" class="flex flex-col items-center justify-center text-slate-400 hover:text-primary transition-all active:scale-90 duration-150" href="/">
            <span class="material-symbols-outlined">logout</span>
            <span class="text-[9px] font-bold">Log out</span>
        </a>
    </nav>

    <script type="module">
        let allOrders = [];
        let studentFeedbackIds = [];
        let firebaseConfig = null;
        let unsubscribeOrders = null;
        let unsubscribeFeedback = null;
        let pollingInterval = null;

        const loggedInUser = JSON.parse(sessionStorage.getItem('user')) || { id: 1, name: 'Arjun' };

        function formatTime(isoString) {
            if (!isoString) return '';
            const date = new Date(isoString);
            return date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
        }

        // Fallback: Fetch Orders via API
        async function fetchQueue() {
            try {
                const res = await fetch('/api/orders');
                const orders = await res.json();
                allOrders = orders.filter(o => o.user_id === loggedInUser.id);
                
                const fbRes = await fetch('/api/feedback');
                const feedbacks = await fbRes.json();
                studentFeedbackIds = feedbacks.filter(f => f.user_id === loggedInUser.id).map(f => f.menu_item_id);
                
                renderOrders();
            } catch (err) {
                console.error("Failed to fetch student orders", err);
            }
        }

        // Render Orders List
        function renderOrders() {
            if (allOrders.length === 0) {
                document.getElementById('empty-state').classList.remove('hidden');
                document.getElementById('active-section').classList.add('hidden');
                return;
            }

            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('active-section').classList.remove('hidden');

            const activeOrders = allOrders.filter(o => o.status !== 'Completed' && o.status !== 'Handed Over');
            const pastOrders = allOrders.filter(o => o.status === 'Completed' || o.status === 'Handed Over');

            // Render Active
            document.getElementById('active-count-badge').textContent = `${activeOrders.length} Ongoing`;
            const activeContainer = document.getElementById('active-orders-container');
            if (activeOrders.length === 0) {
                activeContainer.innerHTML = `<div class="text-xs text-slate-400 text-center py-6">No ongoing orders.</div>`;
            } else {
                activeContainer.innerHTML = activeOrders.map(order => {
                    const itemsSummary = order.items.map(i => `${i.quantity}x ${i.name}`).join(', ');
                    
                    // Determine step states and progress line width
                    let progressPercent = 0;
                    let isStep1Active = false;
                    let isStep2Active = false;
                    let isStep2Completed = false;
                    let isStep3Active = false;
                    let isStep3Completed = false;
                    let isStep4Active = false;

                    let statusText = order.status;
                    let statusColorClass = 'text-slate-400 bg-slate-800 border-slate-700';
                    let statusIcon = 'hourglass_empty';

                    if (order.status === 'Pending') {
                        progressPercent = 12;
                        isStep1Active = true;
                        statusText = 'Pending';
                        statusColorClass = 'text-slate-400 bg-slate-800/80 border-slate-700/50';
                        statusIcon = 'hourglass_empty';
                    } else if (order.status === 'Preparing') {
                        progressPercent = 50;
                        isStep1Active = true;
                        isStep2Active = true;
                        statusText = 'Preparing';
                        statusColorClass = 'text-secondary bg-secondary/10 border-secondary/20';
                        statusIcon = 'restaurant';
                    } else if (order.status === 'Ready') {
                        progressPercent = 88;
                        isStep1Active = true;
                        isStep2Completed = true;
                        isStep3Active = true;
                        statusText = 'Ready';
                        statusColorClass = 'text-primary bg-primary/10 border-primary/20 status-pulse';
                        statusIcon = 'check_circle';
                    } else if (order.status === 'Handed Over' || order.status === 'Completed') {
                        progressPercent = 100;
                        isStep1Active = true;
                        isStep2Completed = true;
                        isStep3Completed = true;
                        isStep4Active = true;
                        statusText = 'Collected';
                        statusColorClass = 'text-slate-450 bg-slate-800/80 border-slate-700/50';
                        statusIcon = 'inventory';
                    }

                    // Timeline tracker HTML
                    const timelineHtml = `
                        <div class="mt-4 pt-4 border-t border-slate-800/60 relative">
                            <!-- Progress Bar Line Background -->
                            <div class="absolute left-6 right-6 top-[28px] h-[3px] bg-slate-800 z-0 rounded-full"></div>
                            <!-- Active Progress Line -->
                            <div class="absolute left-6 top-[28px] h-[3px] bg-primary z-0 rounded-full transition-all duration-700" style="width: calc(${progressPercent}% - 12px)"></div>
                            
                            <div class="flex justify-between items-start relative z-10">
                                <!-- Step 1: Placed -->
                                <div class="flex flex-col items-center min-w-[50px]">
                                    <div class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold ${isStep1Active ? 'bg-primary text-slate-950 shadow-md shadow-primary/20' : 'bg-slate-850 text-slate-500 border border-slate-800'}">
                                        <span class="material-symbols-outlined text-[14px]">receipt</span>
                                    </div>
                                    <span class="text-[9px] font-bold mt-1.5 ${isStep1Active ? 'text-white' : 'text-slate-500'}">Placed</span>
                                    <span class="text-[8px] text-slate-400 mt-0.5">${formatTime(order.pendingAt || order.created_at)}</span>
                                </div>
                                
                                <!-- Step 2: Preparing -->
                                <div class="flex flex-col items-center min-w-[50px]">
                                    <div class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold ${isStep2Active ? 'bg-secondary text-slate-950 shadow-md shadow-secondary/20 animate-pulse' : (isStep2Completed ? 'bg-primary text-slate-950' : 'bg-slate-850 text-slate-500 border border-slate-800')}">
                                        <span class="material-symbols-outlined text-[14px]">restaurant</span>
                                    </div>
                                    <span class="text-[9px] font-bold mt-1.5 ${isStep2Active ? 'text-secondary font-black' : (isStep2Completed ? 'text-white' : 'text-slate-500')}">Preparing</span>
                                    <span class="text-[8px] text-slate-400 mt-0.5">${formatTime(order.preparingAt)}</span>
                                </div>
                                
                                <!-- Step 3: Ready -->
                                <div class="flex flex-col items-center min-w-[50px]">
                                    <div class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold ${isStep3Active ? 'bg-primary text-slate-950 shadow-md shadow-primary/20 status-pulse animate-pulse' : (isStep3Completed ? 'bg-primary text-slate-950' : 'bg-slate-850 text-slate-500 border border-slate-800')}">
                                        <span class="material-symbols-outlined text-[14px]">check_circle</span>
                                    </div>
                                    <span class="text-[9px] font-bold mt-1.5 ${isStep3Active ? 'text-primary font-black animate-pulse' : (isStep3Completed ? 'text-white' : 'text-slate-500')}">Ready</span>
                                    <span class="text-[8px] text-slate-400 mt-0.5">${formatTime(order.readyAt)}</span>
                                </div>
                                
                                <!-- Step 4: Handed Over -->
                                <div class="flex flex-col items-center min-w-[50px]">
                                    <div class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold ${isStep4Active ? 'bg-slate-750 text-white' : 'bg-slate-850 text-slate-500 border border-slate-800'}">
                                        <span class="material-symbols-outlined text-[14px]">inventory</span>
                                    </div>
                                    <span class="text-[9px] font-bold mt-1.5 ${isStep4Active ? 'text-white' : 'text-slate-500'}">Collected</span>
                                    <span class="text-[8px] text-slate-400 mt-0.5">${formatTime(order.handedOverAt)}</span>
                                </div>
                            </div>
                        </div>
                    `;

                    // Estimated Wait info block
                    let estWaitText = 'Waiting for kitchen to accept pre-order...';
                    if (order.status === 'Preparing') {
                        estWaitText = 'Est. Cooking: 5-8 mins remaining';
                    } else if (order.status === 'Ready') {
                        estWaitText = 'Order is Ready! Present QR below to claim';
                    }

                    return `
                        <div class="bg-slate-900 rounded-xl p-4 mb-4 border border-slate-800/80 animate-fade-in-up">
                            <div class="flex justify-between items-start mb-3">
                                <div>
                                    <p class="text-[9px] font-bold text-slate-500 mb-1 uppercase tracking-wider">Pickup slot: ${order.pickup_slot}</p>
                                    <h3 class="text-sm font-bold text-white">${order.items[0]?.name || 'Pre-Order'}</h3>
                                    <p class="text-xs text-slate-400 mt-0.5">${itemsSummary}</p>
                                </div>
                                <div class="px-3 py-1 rounded-full text-xs font-semibold flex items-center gap-1 border ${statusColorClass}">
                                    <span class="material-symbols-outlined text-[14px]">${statusIcon}</span>
                                    ${statusText}
                                </div>
                            </div>

                            <!-- Visual Step Tracker Timeline -->
                            ${timelineHtml}

                            <!-- Wait message -->
                            <div class="text-[10px] text-slate-400 flex items-center gap-1.5 mt-4 bg-slate-950/30 p-2.5 rounded-xl border border-slate-850/40">
                                <span class="w-1.5 h-1.5 rounded-full ${order.status === 'Preparing' ? 'bg-secondary animate-pulse' : (order.status === 'Ready' ? 'bg-primary animate-ping' : 'bg-slate-500')}"></span>
                                <span>${estWaitText}</span>
                            </div>

                            <!-- Token & QR scan section -->
                            <div class="flex items-center justify-between bg-slate-950/40 border border-slate-850 rounded-lg p-3 mt-3">
                                <div>
                                    <p class="text-[9px] font-bold text-slate-500">Token Number</p>
                                    <p class="text-lg font-extrabold text-white tracking-tighter">${order.token_number}</p>
                                </div>
                                <div onclick="showQRModal('${order.id}')" class="h-10 w-10 bg-white rounded-lg flex items-center justify-center p-1 border border-slate-800 cursor-pointer hover:border-primary hover:scale-105 active:scale-95 transition-all" title="Click to show QR Code">
                                    <span class="material-symbols-outlined text-slate-900 text-2xl font-bold">qr_code_2</span>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            // Render Past
            const pastContainer = document.getElementById('past-orders-container');
            if (pastOrders.length === 0) {
                pastContainer.innerHTML = `<div class="text-xs text-slate-400 text-center py-6">No order history found.</div>`;
            } else {
                pastContainer.innerHTML = pastOrders.map(order => {
                    const itemsSummary = order.items.map(i => `${i.quantity}x ${i.name}`).join(', ');
                    const orderDate = new Date(order.created_at).toLocaleDateString('en-US', { day: 'numeric', month: 'short' });
                    const orderTime = new Date(order.created_at).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

                    const rateItem = order.items[0];
                    const isRated = rateItem ? studentFeedbackIds.includes(rateItem.id) : true;

                    let rateSection = '';
                    if (!isRated && rateItem) {
                        rateSection = `
                            <button onclick="rateOrder(${rateItem.id}, '${rateItem.name}', '${orderDate}')" class="flex-grow py-2 px-4 rounded-xl bg-secondary text-white font-bold text-xs shadow-sm active:scale-95 transition-all hover:brightness-110 flex items-center justify-center gap-1">
                                <span class="material-symbols-outlined text-[14px]">star</span>
                                Rate Meal
                            </button>
                        `;
                    } else {
                        rateSection = `
                            <div class="flex items-center gap-1 py-2 font-semibold text-xs text-primary bg-primary/5 border border-primary/10 rounded-xl px-4 flex-grow justify-center">
                                <span class="material-symbols-outlined text-primary text-xs font-bold">check_circle</span>
                                <span>Rated</span>
                            </div>
                        `;
                    }

                    return `
                        <div class="bg-slate-900 rounded-xl p-4 mb-4 border border-slate-800">
                            <div class="flex gap-3.5">
                                <div class="w-16 h-16 rounded-lg overflow-hidden flex-shrink-0 relative">
                                    <img class="w-full h-full object-cover" src="${order.items[0]?.image_url || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=100'}" alt=""/>
                                </div>
                                <div class="flex-grow min-w-0">
                                    <div class="flex justify-between items-start gap-1">
                                        <h4 class="text-xs font-bold text-white truncate pr-1">${order.items[0]?.name || 'Canteen Meal'}</h4>
                                        <p class="text-xs font-bold text-white">₹${order.total_amount.toFixed(2)}</p>
                                    </div>
                                    <p class="text-[10px] text-slate-500 mt-0.5 mb-3">${orderDate} • ${orderTime}</p>
                                    <div class="flex gap-2">
                                        <button onclick="reorderItems(${order.id})" class="flex-grow py-2 px-4 rounded-xl border border-primary text-primary font-bold text-xs hover:bg-slate-850 transition-colors active:scale-95" id="reorder-btn-${order.id}">
                                            Reorder
                                        </button>
                                        ${rateSection}
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }
        }

        function rateOrder(itemId, itemName, dateStr) {
            sessionStorage.setItem('rating_item_id', itemId);
            sessionStorage.setItem('rating_item_name', itemName);
            sessionStorage.setItem('rating_item_date', dateStr);
            window.location.href = '/student/feedback.html';
        }

        async function reorderItems(orderId) {
            const btn = document.getElementById(`reorder-btn-${orderId}`);
            btn.textContent = 'Adding...';
            
            try {
                let order;
                if (firebaseConfig && firebaseConfig.projectId !== "YOUR_PROJECT_ID") {
                    order = allOrders.find(o => String(o.id) === String(orderId) || String(o.token_number) === String(orderId));
                } else {
                    const res = await fetch('/api/orders');
                    const orders = await res.json();
                    order = orders.find(o => o.id === orderId);
                }
                
                if (order) {
                    const cart = order.items.map(item => ({
                        id: item.id,
                        name: item.name,
                        price: item.price,
                        is_veg: item.is_veg === undefined ? true : item.is_veg,
                        image_url: item.image_url || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=100',
                        quantity: item.quantity
                    }));
                    localStorage.setItem('cart', JSON.stringify(cart));
                    btn.textContent = 'Added!';
                    btn.className = 'flex-grow py-2 px-4 rounded-xl bg-primary text-slate-950 font-bold text-xs active:scale-95 transition-all';
                    setTimeout(() => {
                        window.location.href = '/student/checkout.html';
                    }, 1000);
                }
            } catch (err) {
                console.error(err);
                btn.textContent = 'Reorder';
            }
        }

        // Setup real-time listener or fallback
        async function fetchConfigAndInit() {
            try {
                const res = await fetch('/api/config');
                const config = await res.json();
                firebaseConfig = config.firebaseConfig;
                await initRealtime();
            } catch (err) {
                console.error("Failed to fetch Firebase config, falling back to HTTP polling:", err);
                startPolling();
            }
        }

        async function initRealtime() {
            if (!firebaseConfig || firebaseConfig.projectId === "YOUR_PROJECT_ID") {
                console.warn("Firebase is not configured. Falling back to HTTP polling.");
                startPolling();
                return;
            }

            try {
                const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js");
                const { getFirestore, collection, onSnapshot } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
                
                console.log("Firebase initialized successfully on Orders view. Starting listeners.");
                const app = initializeApp(firebaseConfig);
                const db = getFirestore(app);
                
                // 1. Listen to orders
                const previousOrderStatuses = new Map();
                let isFirstOrderSnapshot = true;

                unsubscribeOrders = onSnapshot(collection(db, 'orders'), (snapshot) => {
                    const rawOrders = [];
                    snapshot.forEach((doc) => {
                        const data = doc.data();
                        const orderId = doc.id;
                        rawOrders.push({
                            id: Number(doc.id) || doc.id,
                            ...data
                        });

                        // Notify student if state transitions to Ready
                        if (data.user_id === loggedInUser.id) {
                            const oldStatus = previousOrderStatuses.get(orderId);
                            if (!isFirstOrderSnapshot && oldStatus === 'Preparing' && data.status === 'Ready') {
                                const message = `Your order ${data.token_number} is ready for pickup.`;
                                showToast(message);
                                triggerBrowserNotification(data.token_number);
                            }
                            previousOrderStatuses.set(orderId, data.status);
                        }
                    });
                    isFirstOrderSnapshot = false;
                    
                    // Filter for current student
                    allOrders = rawOrders.filter(o => o.user_id === loggedInUser.id);
                    allOrders.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
                    renderOrders();
                }, (error) => {
                    console.error("Orders onSnapshot error, falling back to polling:", error);
                    startPolling();
                });

                // 2. Listen to feedback
                unsubscribeFeedback = onSnapshot(collection(db, 'feedback'), (snapshot) => {
                    const rawFeedbacks = [];
                    snapshot.forEach((doc) => {
                        rawFeedbacks.push({
                            id: doc.id,
                            ...doc.data()
                        });
                    });
                    
                    studentFeedbackIds = rawFeedbacks
                        .filter(f => f.user_id === loggedInUser.id)
                        .map(f => f.menu_item_id);
                    
                    renderOrders();
                }, (error) => {
                    console.error("Feedback onSnapshot error:", error);
                });

            } catch (err) {
                console.error("Failed to initialize Firebase SDK, falling back to HTTP polling:", err);
                startPolling();
            }
        }

        function startPolling() {
            if (pollingInterval) return;
            fetchQueue();
            pollingInterval = setInterval(fetchQueue, 10000);
        }

        function showQRModal(orderId) {
            const order = allOrders.find(o => String(o.id) === String(orderId));
            if (!order) return;

            let modal = document.getElementById('qr-modal');
            if (!modal) {
                modal = document.createElement('div');
                modal.id = 'qr-modal';
                modal.className = 'fixed inset-0 z-[100] flex items-center justify-center hidden bg-black/80 backdrop-blur-sm p-4';
                modal.innerHTML = `
                    <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 max-w-sm w-full relative flex flex-col items-center gap-4 text-center animate-fade-in-up">
                        <button onclick="closeQRModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white transition-colors">
                            <span class="material-symbols-outlined">close</span>
                        </button>
                        <h3 class="text-base font-extrabold text-white">Order Pickup Verification</h3>
                        <p class="text-[10px] text-slate-400">Present this QR code to the kitchen staff to claim your order.</p>
                        <div class="bg-white p-3 rounded-2xl border-4 border-primary/20 shadow-lg" id="modal-qr-container"></div>
                        <div class="w-full space-y-1 bg-slate-950/50 p-3 rounded-xl border border-slate-850 text-left text-[11px] font-mono">
                            <div class="flex justify-between"><span class="text-slate-500">Order ID:</span><span class="text-white font-bold" id="qr-modal-order-id"></span></div>
                            <div class="flex justify-between"><span class="text-slate-500">Token Num:</span><span class="text-primary font-bold" id="qr-modal-token"></span></div>
                            <div class="flex justify-between"><span class="text-slate-500">Student ID:</span><span class="text-white font-bold" id="qr-modal-student-id"></span></div>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);
            }
            
            const qrContainer = document.getElementById('modal-qr-container');
            qrContainer.innerHTML = '';
            
            const storedPayload = order.qrPayload || {
                orderId: String(order.id),
                tokenNumber: order.token_number,
                studentId: loggedInUser.collegeId || 'CS-10245-26'
            };

            document.getElementById('qr-modal-order-id').textContent = storedPayload.orderId;
            document.getElementById('qr-modal-token').textContent = storedPayload.tokenNumber;
            document.getElementById('qr-modal-student-id').textContent = storedPayload.studentId;

            const qrData = JSON.stringify({
                orderId: storedPayload.orderId,
                token: storedPayload.tokenNumber,
                studentId: storedPayload.studentId
            });

            new QRCode(qrContainer, {
                text: qrData,
                width: 180,
                height: 180,
                colorDark: '#0f172a',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.M
            });

            modal.classList.remove('hidden');
        }

        // Toast Notification System
        function showToast(message) {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                container.className = 'fixed bottom-20 right-4 z-[9999] flex flex-col gap-2 pointer-events-none';
                document.body.appendChild(container);
            }
            
            const toast = document.createElement('div');
            toast.className = 'animate-fade-in-up bg-slate-900 border border-emerald-500/30 text-white px-5 py-3 rounded-2xl shadow-2xl flex items-center gap-3 backdrop-blur-md pointer-events-auto max-w-sm';
            toast.innerHTML = `
                <span class="material-symbols-outlined text-primary">check_circle</span>
                <div class="flex-grow">
                    <p class="text-xs font-bold">${message}</p>
                </div>
                <button onclick="this.parentElement.remove()" class="text-slate-400 hover:text-white transition-colors">
                    <span class="material-symbols-outlined text-sm">close</span>
                </button>
            `;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(10px)';
                toast.style.transition = 'all 0.5s ease-out';
                setTimeout(() => toast.remove(), 500);
            }, 5000);
        }

        // Request browser notification permission
        if (Notification.permission === 'default') {
            Notification.requestPermission();
        }

        function triggerBrowserNotification(tokenNumber) {
            if (Notification.permission === 'granted') {
                new Notification("CafeGo Order Ready", {
                    body: `Your order ${tokenNumber} is ready for pickup.`,
                    icon: "https://lh3.googleusercontent.com/aida-public/AB6AXuADEUPr8GJpMcuQcACnK1Hs9JierNenB8TwdaZXtYELr1t5sn-3qYDS-DZUYeXKBKcRCZyZYtn1BySwBeQv6l4s79eJOyjBUwp7lzPIJGPlDRMuxV3IbULJvnRM2xeZIi6ZAu5KhslvnKDnW-VIvei5ONFZJ3sUxH3Fsn_v4uUnXXcPUY2_ypFxJCWqisW2bfjuop02HJb1VVexAr4yuZ3UbaDj74NQnTsjReJLXSJdSPvykSZvCyqTLbyoue7RcXoUPwJ-C-0t9zN2"
                });
            }
        }

        function closeQRModal() {
            const modal = document.getElementById('qr-modal');
            if (modal) {
                modal.classList.add('hidden');
            }
        }

        // Bind handlers to window for inline onclick attributes
        window.rateOrder = rateOrder;
        window.reorderItems = reorderItems;
        window.showQRModal = showQRModal;
        window.closeQRModal = closeQRModal;

        // Cleanup
        window.addEventListener('beforeunload', () => {
            if (unsubscribeOrders) unsubscribeOrders();
            if (unsubscribeFeedback) unsubscribeFeedback();
            if (pollingInterval) clearInterval(pollingInterval);
        });

        // Initial load
        fetchConfigAndInit();
    </script>
</body>
</html>
