<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>CafeGo - Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="/css/styles.css" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary": "#ffb3ae",
                        "surface-container-high": "#2a2a2a",
                        "primary-container": "#4fa07a",
                        "on-secondary-fixed-variant": "#5e4100",
                        "inverse-surface": "#e5e2e1",
                        "surface-bright": "#393939",
                        "on-surface": "#e5e2e1",
                        "on-primary-fixed": "#002113",
                        "on-error": "#690005",
                        "tertiary-fixed": "#ffdad7",
                        "background": "#131313",
                        "surface-container-low": "#1c1b1b",
                        "on-primary": "#003824",
                        "surface-tint": "#86d7ad",
                        "inverse-primary": "#116c4a",
                        "tertiary-fixed-dim": "#ffb3ae",
                        "surface-container-highest": "#353534",
                        "outline-variant": "#3f4943",
                        "on-tertiary-fixed-variant": "#930014",
                        "secondary-fixed-dim": "#ffba27",
                        "on-tertiary-container": "#5c0008",
                        "on-tertiary": "#68000b",
                        "secondary": "#ffd795",
                        "outline": "#89938b",
                        "on-surface-variant": "#bec9c0",
                        "secondary-fixed": "#ffdea9",
                        "secondary-container": "#fbb400",
                        "primary-fixed": "#a1f4c8",
                        "on-secondary": "#422c00",
                        "primary-fixed-dim": "#86d7ad",
                        "inverse-on-surface": "#313030",
                        "on-secondary-fixed": "#271900",
                        "surface-container": "#201f1f",
                        "on-primary-fixed-variant": "#005236",
                        "surface-container-lowest": "#0e0e0e",
                        "error-container": "#93000a",
                        "primary": "#86d7ad",
                        "surface-dim": "#131313",
                        "on-primary-container": "#00311e",
                        "on-error-container": "#ffdad6",
                        "on-secondary-container": "#694900",
                        "on-background": "#e5e2e1",
                        "surface": "#131313",
                        "surface-variant": "#353534",
                        "tertiary-container": "#ff5352",
                        "on-tertiary-fixed": "#410004",
                        "error": "#ffb4ab"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "16px",
                        "margin-desktop": "64px",
                        "base": "8px",
                        "margin-mobile": "16px",
                        "container-padding": "24px"
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background font-body-md selection:bg-primary-container selection:text-on-primary-container min-h-screen overflow-x-hidden flex flex-col">
    <!-- Background Atmospheric Effect -->
    <div class="fixed inset-0 z-0 pointer-events-none">
        <div class="absolute inset-0 bg-gradient-to-tr from-background via-transparent to-primary/5"></div>
    </div>
    
    <!-- Main Content Canvas -->
    <main class="relative z-10 flex-grow flex items-center justify-center p-margin-mobile md:p-margin-desktop">
        <div class="w-full max-w-[1200px] grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
            <!-- Left Side: Branding & Visuals -->
            <div class="hidden lg:flex flex-col space-y-8">
                <div class="flex items-center gap-4">
                    <div class="bg-primary/10 p-3 rounded-xl border border-primary/20">
                        <span class="material-symbols-outlined text-primary text-[40px]">restaurant</span>
                    </div>
                    <h1 class="font-headline-xl text-headline-xl text-primary tracking-tight text-3xl font-extrabold">CafeGo</h1>
                </div>
                <div class="space-y-4">
                    <h2 class="text-3xl font-bold text-on-surface leading-tight">
                        Experience the future of <span class="text-secondary text-amber-highlight">Campus Dining.</span>
                    </h2>
                    <p class="text-lg text-on-surface-variant max-w-md">
                        Pre-order meals, manage your nutritional goals, and skip the queue with our integrated smart ecosystem. Fresh food, tech-first delivery.
                    </p>
                </div>
                <!-- Featured Image with Glass Frame -->
                <div class="relative group">
                    <div class="absolute -inset-4 bg-primary/20 blur-3xl opacity-20 rounded-full group-hover:opacity-40 transition-opacity"></div>
                    <div class="relative glass-card rounded-[2rem] overflow-hidden p-3 border border-white/5 shadow-2xl">
                        <div class="aspect-[4/3] rounded-[1.5rem] bg-surface-container-high overflow-hidden">
                            <img class="w-full h-full object-cover transform transition-transform duration-700 group-hover:scale-105" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCY8BTnaa4bmeFMn1ZcrlyavBXbAX7s9Brn4MgBItjVTs6qF_ebuSTC8kbeRZrA2UvW7yO3Op_-tTwnZTTgbhnZNjP-_4f-qdyx-omOIJoElnDjCD4mVaPC-_zqIrZloC9uzRtBwICSlTD093lDdMMKV35yAJ9h3Z9xkmnW1Mzo8B_RIiMZUnAnSguuUxu2pfTMR0X9ovn9GQIMxn7JoJzUINmIpFBfMKZcu4Zk3XrFZL0CPn2lZjkeAXvGu0SMgMLsldcueFtJqVpH"/>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Side: Login Card -->
            <div class="flex justify-center lg:justify-end">
                <div class="glass-card w-full max-w-[480px] p-8 md:p-10 rounded-[2.5rem] shadow-2xl border border-white/10 animate-fade-in-up">
                    <!-- Mobile Logo (Visible only on small screens) -->
                    <div class="lg:hidden flex flex-col items-center mb-8">
                        <span class="material-symbols-outlined text-primary text-[48px] mb-2">restaurant</span>
                        <h1 class="text-2xl font-bold text-primary">CafeGo</h1>
                    </div>
                    <div class="mb-8">
                        <h3 class="text-2xl font-bold text-on-surface mb-2">Welcome Back</h3>
                        <p class="text-sm text-on-surface-variant">Please select your role to continue.</p>
                    </div>

                    <!-- Role Selection Tabs -->
                    <div class="grid grid-cols-3 gap-3 mb-8">
                        <button id="role-student" class="role-btn role-tab-active flex flex-col items-center justify-center p-4 rounded-2xl border border-white/5 bg-surface-container-low transition-all duration-300 hover:bg-surface-variant/20" onclick="selectRole('student')">
                            <span class="material-symbols-outlined text-[24px] mb-2">school</span>
                            <span class="text-xs font-semibold text-center">Student</span>
                        </button>
                        <button id="role-chef" class="role-btn flex flex-col items-center justify-center p-4 rounded-2xl border border-white/5 bg-surface-container-low transition-all duration-300 hover:bg-surface-variant/20" onclick="selectRole('chef')">
                            <span class="material-symbols-outlined text-[24px] mb-2">chef_hat</span>
                            <span class="text-xs font-semibold text-center">Kitchen</span>
                        </button>
                        <button id="role-admin" class="role-btn flex flex-col items-center justify-center p-4 rounded-2xl border border-white/5 bg-surface-container-low transition-all duration-300 hover:bg-surface-variant/20" onclick="selectRole('admin')">
                            <span class="material-symbols-outlined text-[24px] mb-2">admin_panel_settings</span>
                            <span class="text-xs font-semibold text-center">Admin</span>
                        </button>
                    </div>

                    <!-- College ID Input Form -->
                    <div class="space-y-6">
                        <div class="space-y-2">
                            <label id="id-label" class="text-sm font-semibold text-on-surface ml-1">College ID (Format: XX-YYYYY-ZZ)</label>
                            <div class="relative">
                                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">badge</span>
                                <input id="college-id-input" oninput="realTimeValidate()" class="w-full bg-surface-container-lowest border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-on-surface placeholder:text-outline focus:border-primary transition-all duration-200" placeholder="e.g., CS-10245-26" type="text" required/>
                            </div>
                            <p id="error-message" class="text-xs text-red-500 font-bold ml-1 hidden transition-all duration-300"></p>
                            <p id="hint-message" class="text-[10px] text-on-surface-variant/70 ml-1 italic"></p>
                        </div>

                        <button id="login-btn" onclick="handleCollegeIdLogin()" class="w-full flex items-center justify-center gap-3 bg-primary text-on-primary py-4 px-6 rounded-2xl font-semibold text-sm hover:brightness-110 shadow-lg transition-all duration-300 active:scale-[0.98]">
                            <span class="material-symbols-outlined">login</span>
                            Login with College ID
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Interactive Layer: Role Selection & Validation Script -->
    <script>
        let selectedRoleName = 'student';

        function selectRole(role) {
            selectedRoleName = role;
            
            // Remove active classes from all buttons
            document.querySelectorAll('.role-btn').forEach(btn => {
                btn.classList.remove('role-tab-active');
            });
            
            // Add active class to clicked button
            const activeBtn = document.getElementById(`role-${role === 'chef' ? 'chef' : role}`);
            if (activeBtn) activeBtn.classList.add('role-tab-active');
            
            // Visual feedback on inputs and hints
            const input = document.getElementById('college-id-input');
            const label = document.getElementById('id-label');
            const hint = document.getElementById('hint-message');
            
            // Hide previous errors
            hideError();

            if (role === 'chef') {
                label.textContent = 'Kitchen ID (Format: chef-name-YY)';
                input.placeholder = 'e.g., chef-marcus-26';
                hint.textContent = 'Registered credentials format: chef-[name]-[year]';
            } else if (role === 'admin') {
                label.textContent = 'Admin ID (Format: admin-name-YY)';
                input.placeholder = 'e.g., admin-alex-26';
                hint.textContent = 'Registered credentials format: admin-[name]-[year]';
            } else {
                label.textContent = 'College Student ID (Format: XX-YYYYY-ZZ)';
                input.placeholder = 'e.g., CS-10245-26';
                hint.textContent = 'Format: [2-Letter Department]-[5-Digit Roll]-[2-Digit Year]';
            }
        }

        // Real-time styling validation
        function realTimeValidate() {
            const inputVal = document.getElementById('college-id-input').value;
            const inputEl = document.getElementById('college-id-input');
            
            if (!inputVal) {
                inputEl.classList.remove('border-red-500', 'border-primary');
                return;
            }

            const studentRegex = /^[A-Z]{2}-\d{5}-\d{2}$/;
            const staffRegex = /^(chef|admin)-[a-zA-Z]+-\d{2}$/;

            let isValid = false;
            if (selectedRoleName === 'student') {
                isValid = studentRegex.test(inputVal);
            } else {
                isValid = staffRegex.test(inputVal);
            }

            if (isValid) {
                inputEl.classList.remove('border-red-500');
                inputEl.classList.add('border-primary');
                hideError();
            } else {
                inputEl.classList.remove('border-primary');
                inputEl.classList.add('border-red-500');
            }
        }

        function showError(msg) {
            const errorEl = document.getElementById('error-message');
            errorEl.textContent = msg;
            errorEl.classList.remove('hidden');
        }

        function hideError() {
            const errorEl = document.getElementById('error-message');
            errorEl.classList.add('hidden');
        }

        // API verification on submission
        async function handleCollegeIdLogin() {
            const collegeId = document.getElementById('college-id-input').value.trim();
            const loginBtn = document.getElementById('login-btn');
            
            if (!collegeId) {
                showError('College ID cannot be empty.');
                return;
            }

            // Real-time double check
            const studentRegex = /^[A-Z]{2}-\d{5}-\d{2}$/;
            const staffRegex = /^(chef|admin)-[a-zA-Z]+-\d{2}$/;
            let formatValid = selectedRoleName === 'student' ? studentRegex.test(collegeId) : staffRegex.test(collegeId);

            if (!formatValid) {
                const formatExpectation = selectedRoleName === 'student'
                    ? 'XX-YYYYY-ZZ (e.g., CS-10245-26)'
                    : 'role-name-YY (e.g., chef-marcus-26 or admin-alex-26)';
                showError(`Invalid College ID format. Expected: ${formatExpectation}`);
                return;
            }

            // Loader state
            loginBtn.disabled = true;
            loginBtn.innerHTML = `<span class="material-symbols-outlined animate-spin">progress_activity</span> Authenticating...`;

            try {
                const res = await fetch('/api/auth/validate-id', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ collegeId, role: selectedRoleName })
                });

                const data = await res.json();

                if (res.ok && data.valid) {
                    // Use the user details returned from server, fallback to default mock if undefined
                    const user = data.user || {
                        name: selectedRoleName === 'student' ? 'Arjun' : (selectedRoleName === 'chef' ? 'Marcus Chen' : 'Alex Rivera'),
                        email: selectedRoleName === 'student' ? 'arjun@lmcst.ac.in' : (selectedRoleName === 'chef' ? 'chef.marcus@lmcst.ac.in' : 'admin.alex@lmcst.ac.in'),
                        role: selectedRoleName === 'chef' ? 'kitchen' : selectedRoleName,
                        id: selectedRoleName === 'student' ? 1 : (selectedRoleName === 'chef' ? 2 : 3),
                        collegeId: collegeId
                    };
                    sessionStorage.setItem('user', JSON.stringify(user));
                    if (selectedRoleName === 'student') {
                        window.location.href = '/student/index.html';
                    } else if (selectedRoleName === 'chef') {
                        window.location.href = '/kitchen/index.html';
                    } else if (selectedRoleName === 'admin') {
                        window.location.href = '/admin/index.html';
                    }
                } else {
                    showError(data.error || 'Authentication failed.');
                }
            } catch (err) {
                console.error(err);
                showError('Could not reach servers. Check local server status.');
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = `<span class="material-symbols-outlined">login</span> Login with College ID`;
            }
        }
        
        // Initialize default role
        selectRole('student');
    </script>
</body>
</html>
