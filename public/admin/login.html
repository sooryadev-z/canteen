<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>CafeGo Admin - Secure Portal Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
              "surface-container-lowest": "#0e0e0e",
              "on-secondary-fixed-variant": "#5e4100",
              "surface-container-low": "#1c1b1b",
              "surface-bright": "#393939",
              "on-error-container": "#ffdad6",
              "tertiary-container": "#ff5352",
              "surface": "#131313",
              "on-tertiary-container": "#5c0008",
              "primary-fixed-dim": "#86d7ad",
              "on-surface-variant": "#bec9c0",
              "on-surface": "#e5e2e1",
              "surface-variant": "#353534",
              "outline-variant": "#3f4943",
              "on-secondary-container": "#694900",
              "surface-dim": "#131313",
              "tertiary-fixed-dim": "#ffb3ae",
              "primary-fixed": "#a1f4c8",
              "secondary-container": "#fbb400",
              "on-primary-container": "#00311e",
              "surface-container": "#201f1f",
              "secondary": "#ffd795",
              "tertiary": "#ffb3ae",
              "on-primary-fixed-variant": "#005236",
              "surface-container-highest": "#353534",
              "inverse-on-surface": "#313030",
              "on-tertiary-fixed": "#410004",
              "background": "#131313",
              "on-tertiary-fixed-variant": "#930014",
              "on-secondary-fixed": "#271900",
              "on-error": "#690005",
              "on-primary": "#003824",
              "surface-tint": "#86d7ad",
              "outline": "#89938b",
              "inverse-primary": "#116c4a",
              "on-tertiary": "#68000b",
              "secondary-fixed": "#ffdea9",
              "primary": "#86d7ad",
              "secondary-fixed-dim": "#ffba27",
              "primary-container": "#4fa07a",
              "on-secondary": "#422c00",
              "on-primary-fixed": "#002113",
              "inverse-surface": "#e5e2e1",
              "on-background": "#e5e2e1",
              "error": "#ffb4ab",
              "tertiary-fixed": "#ffdad7",
              "surface-container-high": "#2a2a2a",
              "error-container": "#93000a"
            },
            "borderRadius": {
              "DEFAULT": "0.25rem",
              "lg": "0.5rem",
              "xl": "0.75rem",
              "full": "9999px"
            },
            "spacing": {
              "gutter": "16px",
              "base": "8px",
              "margin-desktop": "64px",
              "margin-mobile": "16px",
              "container-padding": "24px"
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="/css/styles.css" rel="stylesheet"/>
</head>
<body class="bg-background text-on-background font-sans selection:bg-primary/30 min-h-screen flex flex-col items-center justify-center relative overflow-x-hidden">
    <!-- Ambient background glows -->
    <div class="fixed inset-0 z-0 pointer-events-none">
        <div class="absolute inset-0 bg-gradient-to-tr from-background via-transparent to-primary/5"></div>
        <div class="absolute top-1/4 right-1/4 w-[300px] h-[300px] rounded-full bg-primary/10 blur-[100px]"></div>
    </div>

    <!-- Login Container -->
    <main class="relative z-10 w-full max-w-[450px] p-6 sm:p-8 animate-fade-in-up">
        <!-- Brand Logo & Header -->
        <div class="flex flex-col items-center mb-8 text-center">
            <div class="bg-primary/10 p-3.5 rounded-2xl border border-primary/20 mb-3">
                <span class="material-symbols-outlined text-primary text-[42px]">admin_panel_settings</span>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-tight">Admin Console</h1>
            <p class="text-xs text-on-surface-variant mt-1">Authorized access only. Sign in to access management panels.</p>
        </div>

        <!-- Glassmorphic Login Card -->
        <div class="glass-card p-8 rounded-[2.5rem] shadow-2xl border border-white/10">
            <h2 class="text-lg font-bold text-white mb-6">Manager Authentication</h2>
            
            <form onsubmit="handleAdminLogin(event)" class="space-y-6">
                <!-- Username/Email Field -->
                <div class="space-y-2">
                    <label class="text-xs font-bold text-on-surface-variant ml-1">Admin Username/Email or ID</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">person</span>
                        <input id="admin-username" class="w-full bg-surface-container-lowest border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-on-surface text-sm placeholder:text-outline focus:border-primary transition-all duration-200" placeholder="e.g., admin.alex@lmcst.ac.in or admin-alex-26" type="text" required/>
                    </div>
                </div>

                <!-- Password Field -->
                <div class="space-y-2">
                    <label class="text-xs font-bold text-on-surface-variant ml-1">Password</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">lock</span>
                        <input id="admin-password" class="w-full bg-surface-container-lowest border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-on-surface text-sm placeholder:text-outline focus:border-primary transition-all duration-200" placeholder="••••••••" type="password" required/>
                    </div>
                </div>

                <!-- Error Box -->
                <p id="error-message" class="text-xs text-red-500 font-bold ml-1 hidden transition-all duration-300"></p>

                <!-- Login Button -->
                <button type="submit" id="login-btn" class="w-full flex items-center justify-center gap-3 bg-primary text-on-primary py-4 px-6 rounded-2xl font-bold text-sm hover:brightness-110 shadow-lg transition-all duration-300 active:scale-[0.98]">
                    <span class="material-symbols-outlined">login</span>
                    Sign In
                </button>
            </form>

            <!-- Divider -->
            <div id="google-divider" class="flex items-center justify-center gap-3 my-4">
                <div class="h-[1px] bg-white/10 flex-grow"></div>
                <span class="text-xs text-on-surface-variant uppercase font-bold">Or</span>
                <div class="h-[1px] bg-white/10 flex-grow"></div>
            </div>

            <!-- Google Sign-In Button -->
            <button type="button" id="google-login-btn" onclick="handleGoogleLogin()" class="w-full flex items-center justify-center gap-3 bg-white/5 border border-white/10 text-white py-4 px-6 rounded-2xl font-bold text-sm hover:bg-white/10 shadow-lg transition-all duration-300 active:scale-[0.98]">
                <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
                </svg>
                Continue with Google
            </button>
        </div>

        <!-- Back to main portal link -->
        <div class="text-center mt-6">
            <a href="/" class="text-xs text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center gap-1">
                <span class="material-symbols-outlined text-[16px]">arrow_back</span>
                Back to main portal
            </a>
        </div>
    </main>

    <script>
        // Auto-login on refresh/revisit if session exists
        const loggedInUser = JSON.parse(sessionStorage.getItem('user'));
        if (loggedInUser && loggedInUser.role === 'admin') {
            window.location.replace('/admin/index.html');
        }

        async function handleAdminLogin(event) {
            event.preventDefault();
            
            const collegeId = document.getElementById('admin-username').value.trim();
            const password = document.getElementById('admin-password').value;
            const loginBtn = document.getElementById('login-btn');
            const errorEl = document.getElementById('error-message');

            errorEl.classList.add('hidden');

            // Format validation: Can be either admin-name-YY or a valid email
            const staffRegex = /^admin-[a-zA-Z]+-\d{2}$/;
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            
            if (!staffRegex.test(collegeId) && !emailRegex.test(collegeId)) {
                errorEl.textContent = 'Invalid Admin ID/Email format. Expected: admin-name-YY or a valid Email';
                errorEl.classList.remove('hidden');
                return;
            }

            // Loader State
            loginBtn.disabled = true;
            loginBtn.innerHTML = `<span class="material-symbols-outlined animate-spin text-[16px]">progress_activity</span> Authenticating...`;

            try {
                const res = await fetch('/api/auth/validate-id', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ collegeId, role: 'admin', password })
                });

                const data = await res.json();

                if (res.ok && data.valid) {
                    sessionStorage.setItem('user', JSON.stringify(data.user));
                    playTransitionAndRedirect('/admin/index.html');
                } else {
                    errorEl.textContent = data.error || 'Authentication failed.';
                    errorEl.classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
                errorEl.textContent = 'Could not reach server. Verify server status.';
                errorEl.classList.remove('hidden');
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = `<span class="material-symbols-outlined">login</span> Sign In`;
            }
        }

        async function handleGoogleLogin() {
            const errorEl = document.getElementById('error-message');
            const loginBtn = document.getElementById('google-login-btn');
            const originalContent = loginBtn.innerHTML;
            
            errorEl.classList.add('hidden');
            
            // Set loading state
            loginBtn.disabled = true;
            loginBtn.innerHTML = `<span class="material-symbols-outlined animate-spin text-[16px]">progress_activity</span> Connecting...`;
            
            try {
                // Fetch Firebase config from backend
                const configRes = await fetch('/api/config');
                const configData = await configRes.json();
                const firebaseConfig = configData.firebaseConfig;
                
                if (!firebaseConfig || firebaseConfig.projectId === "YOUR_PROJECT_ID") {
                    errorEl.textContent = "Firebase is not configured on the backend.";
                    errorEl.classList.remove('hidden');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = originalContent;
                    return;
                }

                // Dynamically load Firebase modules
                const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js");
                const { getAuth, signInWithPopup, GoogleAuthProvider } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js");

                // Initialize Firebase
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                const provider = new GoogleAuthProvider();
                
                provider.setCustomParameters({ prompt: 'select_account' });

                loginBtn.innerHTML = `<span class="material-symbols-outlined animate-spin text-[16px]">progress_activity</span> Google Sign-In...`;

                // Sign in
                const result = await signInWithPopup(auth, provider);
                const idToken = await result.user.getIdToken();

                loginBtn.innerHTML = `<span class="material-symbols-outlined animate-spin text-[16px]">progress_activity</span> Authenticating...`;

                // POST to backend
                const res = await fetch('/api/auth/google-signin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idToken, role: 'admin' })
                });

                const data = await res.json();

                if (res.ok && data.success) {
                    sessionStorage.setItem('user', JSON.stringify(data.user));
                    playTransitionAndRedirect('/admin/index.html');
                } else {
                    errorEl.textContent = data.error || 'Google login verification failed.';
                    errorEl.classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
                let msg = err.message || 'Could not complete Google Authentication.';
                if (err.code === 'auth/popup-closed-by-user') {
                    msg = 'Sign-in popup closed before completion.';
                } else if (err.code === 'auth/network-request-failed') {
                    msg = 'Network failure during Google Authentication.';
                }
                errorEl.textContent = msg;
                errorEl.classList.remove('hidden');
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = originalContent;
            }
        }

        async function playTransitionAndRedirect(redirectUrl) {
            const overlay = document.getElementById('transition-overlay');
            const spinner = document.getElementById('transition-spinner-circle');
            const checkmark = document.getElementById('transition-checkmark');
            const title = document.getElementById('transition-title');
            const subtitle = document.getElementById('transition-subtitle');
            const content = document.getElementById('transition-content');

            // 1. Show overlay
            overlay.classList.remove('opacity-0', 'pointer-events-none');
            overlay.classList.add('opacity-100');
            content.classList.remove('scale-95');
            content.classList.add('scale-100');

            // 2. Animate spinner drawing
            spinner.style.strokeDashoffset = '0';

            // Wait for validation/spinner drawing (400ms)
            await new Promise(resolve => setTimeout(resolve, 400));

            // 3. Morph spinner to success checkmark
            checkmark.classList.remove('opacity-0', 'scale-50');
            checkmark.classList.add('opacity-100', 'scale-100', 'transition-checkmark-active');
            spinner.setAttribute('stroke', '#a1f4c8'); // Brighten the circle
            title.textContent = 'Access Granted';
            title.classList.add('text-primary');
            subtitle.textContent = 'Redirecting to your dashboard...';

            // Wait for checkmark check to feel satisfying (450ms)
            await new Promise(resolve => setTimeout(resolve, 450));

            // 4. Slide out/fade out transition overlay
            overlay.classList.add('transition-overlay-exit');

            // Wait for slide up animation (350ms)
            await new Promise(resolve => setTimeout(resolve, 350));

            // 5. Redirect
            window.location.href = redirectUrl;
        }
    </script>

    <!-- Premium Transition Overlay -->
    <div id="transition-overlay" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-background/95 backdrop-blur-md opacity-0 pointer-events-none transition-all duration-300">
        <div class="flex flex-col items-center space-y-6 transform scale-95 transition-transform duration-300" id="transition-content">
            <div class="relative w-24 h-24 flex items-center justify-center">
                <!-- SVG Morphing Spinner Circle -->
                <svg class="absolute inset-0 w-full h-full rotate-[-90deg]">
                    <circle cx="48" cy="48" r="42" stroke="rgba(134, 215, 173, 0.1)" stroke-width="6" fill="none" />
                    <circle id="transition-spinner-circle" cx="48" cy="48" r="42" stroke="#86d7ad" stroke-width="6" fill="none" 
                            stroke-dasharray="264" stroke-dashoffset="264" class="transition-all duration-500 ease-out" />
                </svg>
                <!-- Checkmark Icon -->
                <span id="transition-checkmark" class="material-symbols-outlined text-primary text-[56px] opacity-0 scale-50 transition-all duration-300">check</span>
            </div>
            <div class="text-center">
                <p id="transition-title" class="text-lg font-bold text-white tracking-wide">Authenticating...</p>
                <p id="transition-subtitle" class="text-xs text-on-surface-variant/70 mt-1">Verifying secure credentials</p>
            </div>
        </div>
    </div>
</body>
</html>
